<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- from-clinic-600 via-clinic-500 to-clinic-400 (logo, barra superior) -->
    <linearGradient id="bar-gold-a" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#9a7b1c" />
      <stop offset="0.5" stop-color="#c9a227" />
      <stop offset="1" stop-color="#e8cf6a" />
    </linearGradient>
    <!-- from-clinic-500 to-clinic-600 (logo, barra inferior) -->
    <linearGradient id="bar-gold-b" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#c9a227" />
      <stop offset="1" stop-color="#9a7b1c" />
    </linearGradient>
    <!-- prata: zinc-700 → zinc-300 (meio do logo) -->
    <linearGradient id="bar-silver" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#3f3f46" />
      <stop offset="0.45" stop-color="#a1a1aa" />
      <stop offset="1" stop-color="#d4d4d8" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#18181b" />
  <!-- proporções tipo hero: 1ª mais curta, 2ª mais longa, 3ª média; gap ~3px -->
  <rect x="9" y="9.5" width="14" height="3" rx="1.5" fill="url(#bar-gold-a)" />
  <rect x="6" y="15.5" width="20" height="3" rx="1.5" fill="url(#bar-silver)" />
  <rect x="10" y="21.5" width="12" height="3" rx="1.5" fill="url(#bar-gold-b)" />
</svg>
