services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "4000"
      MONGODB_URI: mongodb://mongo:27017/saas_poc
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo

volumes:
  mongo_data:
